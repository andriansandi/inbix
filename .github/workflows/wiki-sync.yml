name: Sync Wiki

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'README.md'
      - 'ROADMAP.md'
      - 'CONTRIBUTING.md'
      - 'SECURITY.md'
      - '.github/workflows/wiki-sync.yml'
      - 'scripts/sync-wiki.js'
      - 'scripts/sync-wiki.sh'

  workflow_dispatch:

jobs:
  sync:
    name: Sync docs to GitHub Wiki
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Checkout wiki repository
        uses: actions/checkout@v4
        with:
          repository: andriansandi/inbix.wiki
          path: wiki
          token: ${{ secrets.WIKI_PAT }}

      - name: Sync documentation files
        run: bash scripts/sync-wiki.sh

      - name: Commit and push wiki changes
        run: |
          cd wiki
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No wiki changes to commit."
          else
            git commit -m "docs: sync wiki from main (${{ github.sha }})"
            git push
          fi
