name: Sync Wiki

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'README.md'
      - 'ROADMAP.md'
      - 'CONTRIBUTING.md'
      - 'SECURITY.md'
      - '.github/workflows/wiki-sync.yml'
      - 'scripts/sync-wiki.js'
      - 'scripts/sync-wiki.sh'

  workflow_dispatch:

jobs:
  sync:
    name: Sync docs to GitHub Wiki
    runs-on: ubuntu-latest
    env:
      WIKI_PAT: ${{ secrets.WIKI_PAT }}
    steps:
      - name: Check WIKI_PAT secret
        if: env.WIKI_PAT == ''
        run: |
          echo "::error::WIKI_PAT secret is missing. Add it in Settings → Secrets and variables → Actions."
          exit 1

      - name: Checkout main repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false

      - name: Checkout wiki repository
        uses: actions/checkout@v5
        with:
          repository: andriansandi/inbix.wiki
          path: wiki
          token: ${{ env.WIKI_PAT }}

      - name: Sync documentation files
        run: bash scripts/sync-wiki.sh

      - name: Commit and push wiki changes
        run: |
          cd wiki
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No wiki changes to commit."
          else
            git commit -m "docs: sync wiki from main (${{ github.sha }})"
            git push
          fi
